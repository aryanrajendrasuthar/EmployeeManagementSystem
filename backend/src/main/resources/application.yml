spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ems_db
    username: ems_user
    password: ems_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 600000

jwt:
  secret: ZW1zU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uVGhhdElzQXRMZWFzdDI1NkJpdHNMb25n
  expiration: 86400000

server:
  port: 8080

cors:
  allowed-origins: http://localhost:5173
